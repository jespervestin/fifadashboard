<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MSP Nordics — Fantasy World Cup 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700;800&display=swap" rel="stylesheet">
<style>

  :root {
    --bg: #0a1410;
    --bg-2: #0f1d17;
    --pitch-line: rgba(255,255,255,0.04);
    --gold: #e8c547;
    --gold-soft: #f3da8a;
    --green: #2bb673;
    --green-glow: rgba(43,182,115,0.25);
    --text: #f4f1e8;
    --text-dim: #8fa399;
    --row-bg: #11231b;
    --row-bg-alt: #0d1d16;
    --row-leader: #16301f;
    --border: #1d3329;

    --font-display: 'Oswald', 'Arial Narrow', Arial, sans-serif;
    --font-score: 'JetBrains Mono', 'Courier New', monospace;
    --glow-gold: 0 0 18px rgba(232,197,71,0.35);
    --glow-green: 0 0 18px rgba(43,182,115,0.35);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%;
    height: 100%;
    background: var(--bg);
    overflow: hidden;
  }

  body {
    font-family: var(--font-display);
    font-weight: 400;
    color: var(--text);
    background:
      repeating-linear-gradient(
        0deg,
        transparent,
        transparent 79px,
        var(--pitch-line) 79px,
        var(--pitch-line) 80px
      ),
      radial-gradient(ellipse at 8% -10%, rgba(232,197,71,0.07) 0%, transparent 40%),
      radial-gradient(ellipse at 92% -10%, rgba(232,197,71,0.07) 0%, transparent 40%),
      radial-gradient(ellipse at 50% -10%, rgba(43,182,115,0.12) 0%, transparent 55%),
      var(--bg);
    display: flex;
    flex-direction: column;
    height: 100vh;
    padding: clamp(16px, 2.5vw, 40px);
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-bottom: clamp(12px, 1.8vh, 24px);
    border-bottom: 2px solid var(--border);
    margin-bottom: clamp(12px, 1.8vh, 24px);
  }

  .title-block {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .eyebrow {
    font-family: var(--font-display);
    font-weight: 600;
    letter-spacing: 0.5em;
    font-size: clamp(11px, 1.1vw, 16px);
    color: var(--green);
    text-transform: uppercase;
  }

  h1 {
    font-family: var(--font-display);
    font-weight: 700;
    font-style: italic;
    font-size: clamp(28px, 4.2vw, 64px);
    letter-spacing: 0.02em;
    line-height: 1;
    color: var(--text);
    text-transform: uppercase;
  }

  h1 span {
    color: var(--gold);
  }

  .meta {
    text-align: right;
    display: flex;
    flex-direction: column;
    gap: 6px;
    align-items: flex-end;
  }

  .group-name {
    font-family: var(--font-display);
    font-size: clamp(16px, 1.8vw, 26px);
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text);
  }

  .live-dot {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: var(--font-score);
    font-size: clamp(11px, 1.1vw, 15px);
    letter-spacing: 0.2em;
    color: var(--text-dim);
    text-transform: uppercase;
    font-weight: 500;
  }

  .live-dot::before {
    content: '';
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 0 0 var(--green-glow);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 var(--green-glow); }
    70% { box-shadow: 0 0 0 12px rgba(43,182,115,0); }
    100% { box-shadow: 0 0 0 0 rgba(43,182,115,0); }
  }

  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }

  .table-head, .row {
    display: grid;
    grid-template-columns: clamp(64px, 5.5vw, 100px) 1fr clamp(120px, 9vw, 180px) clamp(100px, 8vw, 150px);
    align-items: center;
    gap: clamp(12px, 1.5vw, 28px);
    padding: 0 clamp(16px, 1.6vw, 28px);
  }

  .table-head {
    font-family: var(--font-score);
    font-size: clamp(10px, 0.9vw, 13px);
    font-weight: 700;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--text-dim);
    padding-bottom: clamp(8px, 1.2vh, 16px);
    padding-top: 4px;
  }

  .table-head .col-points, .row .col-points { text-align: right; }
  .table-head .col-status, .row .col-status { text-align: center; }

  .rows {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: clamp(6px, 0.8vh, 10px);
    overflow: hidden;
  }

  .row {
    background: var(--row-bg);
    border: 1px solid var(--border);
    border-radius: 14px;
    flex: 1;
    min-height: 0;
    transition: background 0.4s ease, transform 0.4s ease;
  }

  .row.leader {
    background: var(--row-leader);
    border-color: rgba(232,197,71,0.35);
    box-shadow: 0 0 0 1px rgba(232,197,71,0.08), 0 8px 24px -12px rgba(232,197,71,0.25);
  }

  .row:nth-child(even):not(.leader) {
    background: var(--row-bg-alt);
  }

  .position {
    font-family: var(--font-score);
    font-weight: 800;
    font-size: clamp(20px, 2.4vw, 40px);
    color: var(--text-dim);
    font-variant-numeric: tabular-nums;
  }

  .row.leader .position {
    color: var(--gold);
    text-shadow: var(--glow-gold);
  }

  .position .medal {
    font-size: 0.6em;
    margin-left: 4px;
  }

  .player {
    display: flex;
    flex-direction: column;
    gap: 2px;
    min-width: 0;
  }

  .nickname {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: clamp(15px, 1.7vw, 26px);
    letter-spacing: 0.01em;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .fullname {
    font-family: var(--font-score);
    font-size: clamp(10px, 0.9vw, 14px);
    color: var(--text-dim);
    letter-spacing: 0.05em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .points {
    font-family: var(--font-score);
    font-weight: 800;
    font-size: clamp(22px, 2.8vw, 46px);
    font-variant-numeric: tabular-nums;
    color: var(--text);
  }

  .row.leader .points {
    color: var(--gold);
    text-shadow: var(--glow-gold);
  }

  .points .pts-label {
    font-family: var(--font-display);
    font-size: 0.32em;
    letter-spacing: 0.25em;
    color: var(--text-dim);
    font-weight: 500;
    margin-left: 6px;
    text-transform: uppercase;
    text-shadow: none;
  }

  .status-pill {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: clamp(4px, 0.6vh, 8px) clamp(10px, 1vw, 18px);
    border-radius: 999px;
    font-family: var(--font-score);
    font-size: clamp(10px, 0.9vw, 13px);
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    white-space: nowrap;
  }

  .status-complete {
    background: rgba(43,182,115,0.12);
    color: var(--green);
    border: 1px solid rgba(43,182,115,0.3);
  }

  .status-pending {
    background: rgba(232,197,71,0.08);
    color: var(--gold-soft);
    border: 1px solid rgba(232,197,71,0.25);
  }

  footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: clamp(10px, 1.5vh, 18px);
    font-family: var(--font-score);
    font-size: clamp(10px, 0.85vw, 13px);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-dim);
    border-top: 2px solid var(--border);
    margin-top: clamp(12px, 1.8vh, 24px);
  }

  .error-banner {
    display: none;
    background: rgba(220,80,80,0.1);
    border: 1px solid rgba(220,80,80,0.3);
    color: #f0a8a8;
    padding: 12px 18px;
    border-radius: 10px;
    font-family: var(--font-score);
    font-size: clamp(11px, 1vw, 14px);
    letter-spacing: 0.05em;
    margin-bottom: 12px;
    text-transform: none;
  }

  .error-banner.show { display: block; }

  .matches-strip {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: clamp(10px, 1.2vw, 20px);
    margin-bottom: clamp(12px, 1.8vh, 22px);
  }

  .match-card {
    background: var(--row-bg);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: clamp(10px, 1.2vh, 18px) clamp(14px, 1.6vw, 26px);
    display: flex;
    flex-direction: column;
    gap: clamp(4px, 0.6vh, 8px);
    min-width: 0;
  }

  .match-card.next {
    border-color: rgba(232,197,71,0.25);
  }

  .match-label {
    font-family: var(--font-score);
    font-size: clamp(10px, 0.85vw, 13px);
    font-weight: 700;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }

  .match-card.result .match-label { color: var(--green); }
  .match-card.next .match-label { color: var(--gold-soft); }

  .match-group-tag {
    font-weight: 700;
    letter-spacing: 0.1em;
    color: var(--text-dim);
  }

  .match-teams {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: clamp(8px, 1vw, 16px);
  }

  .match-team {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: clamp(15px, 1.7vw, 26px);
    text-transform: uppercase;
    letter-spacing: 0.02em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
    min-width: 0;
  }

  .match-team.away { text-align: right; }

  .match-score {
    font-family: var(--font-score);
    font-weight: 800;
    font-size: clamp(20px, 2.4vw, 38px);
    color: var(--gold);
    text-shadow: var(--glow-gold);
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
    padding: 0 clamp(8px, 1vw, 16px);
  }

  .match-vs {
    font-family: var(--font-score);
    font-size: clamp(11px, 1vw, 15px);
    color: var(--text-dim);
    letter-spacing: 0.2em;
    padding: 0 clamp(8px, 1vw, 16px);
  }


  .match-meta {
    font-family: var(--font-score);
    font-size: clamp(10px, 0.85vw, 13px);
    color: var(--text-dim);
    letter-spacing: 0.05em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
</style>
</head>
<body>

<div class="error-banner" id="errorBanner"></div>

<header>
  <div class="title-block">
    <div class="eyebrow">Fantasy League · Standings</div>
    <h1>FIFA WORLD <span>CUP</span> 2026</h1>
  </div>
  <div class="meta">
    <div class="group-name" id="groupName">MSP Nordics</div>
    <div class="live-dot" id="liveDot">Synkad</div>
  </div>
</header>

<div class="matches-strip" id="matchesStrip">
  <div class="match-card result">
    <div class="match-label">
      <span>Senaste resultatet</span>
      <span class="match-group-tag" id="lastMatchGroup"></span>
    </div>
    <div class="match-teams" id="lastMatchTeams">
      <span class="match-team">Laddar...</span>
    </div>
    <div class="match-meta" id="lastMatchMeta"></div>
  </div>
  <div class="match-card next">
    <div class="match-label">
      <span>Nästa match</span>
      <span class="match-group-tag" id="nextMatchGroup"></span>
    </div>
    <div class="match-teams" id="nextMatchTeams">
      <span class="match-team">Laddar...</span>
    </div>
    <div class="match-meta" id="nextMatchMeta"></div>
  </div>
</div>

<main>
  <div class="table-head">
    <div class="col-pos">Plac.</div>
    <div class="col-name">Spelare</div>
    <div class="col-points">Poäng</div>
    <div class="col-status">Tippset</div>
  </div>
  <div class="rows" id="rows">
    <!-- rows injected here -->
  </div>
</main>

<footer>
  <div id="lastUpdated">Laddar...</div>
  <div>copabet.com · msp-nordics</div>
</footer>

<script>
  const TOURNAMENT_ID = 17;
  const SLUG = "msp-nordics";
  const REFRESH_MS = 60000; // 1 minute

  const PROXY_URL = "https://odd-credit-02b0.jesper-westin.workers.dev/";

  const rowsEl = document.getElementById('rows');
  const lastUpdatedEl = document.getElementById('lastUpdated');
  const groupNameEl = document.getElementById('groupName');
  const errorBanner = document.getElementById('errorBanner');

  function render(members) {
    // Sort by points desc, then by position asc as tiebreak fallback
    const sorted = [...members].sort((a, b) => {
      if (b.points !== a.points) return b.points - a.points;
      return (a.firstName + a.lastName).localeCompare(b.firstName + b.lastName);
    });

    rowsEl.innerHTML = '';

    sorted.forEach((m, i) => {
      const place = i + 1;
      const isLeader = place === 1;
      const name = m.nickname || `${m.firstName} ${m.lastName}`;
      const fullname = `${m.firstName} ${m.lastName}`;

      const row = document.createElement('div');
      row.className = 'row' + (isLeader ? ' leader' : '');

      let medal = '';
      if (place === 1) medal = ' 🥇';
      else if (place === 2) medal = ' 🥈';
      else if (place === 3) medal = ' 🥉';

      const statusClass = m.scorecardComplete ? 'status-complete' : 'status-pending';
      const statusText = m.scorecardComplete ? 'Klart' : 'Saknas';

      row.innerHTML = `
        <div class="position">${place}<span class="medal">${medal}</span></div>
        <div class="player">
          <div class="nickname">${name}</div>
          ${m.nickname ? `<div class="fullname">${fullname}</div>` : ''}
        </div>
        <div class="points">${m.points}<span class="pts-label">poäng</span></div>
        <div class="col-status"><span class="status-pill ${statusClass}">${statusText}</span></div>
      `;

      rowsEl.appendChild(row);
    });
  }

  async function fetchData() {
    try {
      const res = await fetch(PROXY_URL);

      if (!res.ok) throw new Error(`Proxy request failed: ${res.status}`);

      const data = await res.json();

      if (data.error) throw new Error(data.error);
      if (!Array.isArray(data.members)) throw new Error('Unexpected response shape');

      if (data.group?.name) groupNameEl.textContent = data.group.name;

      render(data.members);

      const now = new Date();
      lastUpdatedEl.textContent = `Senast uppdaterad ${now.toLocaleTimeString('sv-SE')}`;
      errorBanner.classList.remove('show');
    } catch (err) {
      errorBanner.textContent = `Kunde inte hämta data: ${err.message}`;
      errorBanner.classList.add('show');
      lastUpdatedEl.textContent = `Senaste lyckade uppdatering misslyckades`;
    }
  }

  fetchData();
  setInterval(fetchData, REFRESH_MS);

  // ---- Matchresultat (openfootball/worldcup.json, öppen källa, ingen nyckel) ----

  const FIXTURES_URL = "https://raw.githubusercontent.com/openfootball/worldcup.json/master/2026/worldcup.json";
  const FIXTURES_REFRESH_MS = 10 * 60 * 1000; // 10 min räcker, datan uppdateras ~1 ggr/dag

  const lastMatchTeamsEl = document.getElementById('lastMatchTeams');
  const lastMatchMetaEl = document.getElementById('lastMatchMeta');
  const lastMatchGroupEl = document.getElementById('lastMatchGroup');
  const nextMatchTeamsEl = document.getElementById('nextMatchTeams');
  const nextMatchMetaEl = document.getElementById('nextMatchMeta');
  const nextMatchGroupEl = document.getElementById('nextMatchGroup');

  function formatMatchDate(dateStr, timeStr) {
    const d = new Date(dateStr);
    const dateLabel = d.toLocaleDateString('sv-SE', { weekday: 'short', day: 'numeric', month: 'short' });
    return timeStr ? `${dateLabel} · ${timeStr}` : dateLabel;
  }

  function renderFixtures(data) {
    const matches = data.matches || [];

    const played = matches.filter(m => m.score && m.score.ft);
    const upcoming = matches.filter(m => !m.score);

    // Senaste resultatet: sista spelade matchen i listordning
    if (played.length > 0) {
      const last = played[played.length - 1];
      const [s1, s2] = last.score.ft;
      lastMatchTeamsEl.innerHTML = `
        <span class="match-team">${last.team1}</span>
        <span class="match-score">${s1} – ${s2}</span>
        <span class="match-team away">${last.team2}</span>
      `;
      lastMatchMetaEl.textContent = `${formatMatchDate(last.date)} · ${last.ground || ''}`;
      lastMatchGroupEl.textContent = last.group || last.round || '';
    } else {
      lastMatchTeamsEl.innerHTML = `<span class="match-team">Inga matcher spelade än</span>`;
      lastMatchMetaEl.textContent = 'Avspark snart!';
      lastMatchGroupEl.textContent = '';
    }

    // Nästa match: första ospelade matchen i listordning
    if (upcoming.length > 0) {
      const next = upcoming[0];
      nextMatchTeamsEl.innerHTML = `
        <span class="match-team">${next.team1}</span>
        <span class="match-vs">VS</span>
        <span class="match-team away">${next.team2}</span>
      `;
      nextMatchMetaEl.textContent = `${formatMatchDate(next.date, next.time)} · ${next.ground || ''}`;
      nextMatchGroupEl.textContent = next.group || next.round || '';
    } else {
      nextMatchTeamsEl.innerHTML = `<span class="match-team">Turneringen är klar!</span>`;
      nextMatchMetaEl.textContent = '';
      nextMatchGroupEl.textContent = '';
    }
  }

  async function fetchFixtures() {
    try {
      const res = await fetch(FIXTURES_URL);
      if (!res.ok) throw new Error(`Fixtures request failed: ${res.status}`);
      const data = await res.json();
      renderFixtures(data);
    } catch (err) {
      lastMatchTeamsEl.innerHTML = `<span class="match-team">Kunde inte hämta matchdata</span>`;
      lastMatchMetaEl.textContent = err.message;
      nextMatchTeamsEl.innerHTML = '';
      nextMatchMetaEl.textContent = '';
    }
  }

  fetchFixtures();
  setInterval(fetchFixtures, FIXTURES_REFRESH_MS);
</script>

</body>
</html>
