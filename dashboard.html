<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MSP Nordics — FIFA World Cup 26</title>
<link rel="icon" href="fifa26-emblem.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    /* FIFA 26 — clean dark identity */
    --bg:          #0C0C0E;
    --surface:     #141417;
    --ink:         #F2F1ED;
    --ink-soft:    #B5B3AC;
    --ink-dim:     #71716C;
    --hairline:    #232328;

    /* United 2026 host colors (brightened for dark bg) */
    --mx-green:    #00A86B;
    --ca-red:      #E5453A;
    --us-blue:     #4D9FE8;

    --gold:        #E8C547;
    --gold-bg:     #1D1909;
    --silver:      #A8B2BC;
    --bronze:      #C8853D;
    --green:       #2BB673;
    --red:         #E5453A;

    --font-display: 'Oswald', 'Arial Narrow', Arial, sans-serif;
    --font-mono:    'JetBrains Mono', 'Courier New', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html { height: 100%; }

  body {
    font-family: var(--font-display);
    color: var(--ink);
    background: var(--bg);
    display: flex;
    flex-direction: column;
    height: 100vh;
    padding: clamp(16px, 2.2vw, 40px);
    overflow: hidden;
  }

  /* United 2026 tri-color line, top of page */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg,
      var(--mx-green) 0%,   var(--mx-green) 33.3%,
      var(--ca-red)   33.3%, var(--ca-red)  66.6%,
      var(--us-blue)  66.6%, var(--us-blue) 100%);
    z-index: 10;
  }

  /* ── HEADER ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
    padding-bottom: clamp(12px, 1.6vh, 22px);
    border-bottom: 1px solid var(--hairline);
    margin-bottom: clamp(12px, 1.6vh, 22px);
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: clamp(14px, 1.8vw, 28px);
    min-width: 0;
  }

  .emblem {
    flex-shrink: 0;
    height: clamp(52px, 7vw, 96px);
    width: auto;
    display: block;
  }

  .title-block {
    display: flex;
    flex-direction: column;
    gap: 2px;
    min-width: 0;
  }

  .eyebrow {
    font-weight: 600;
    letter-spacing: 0.4em;
    font-size: clamp(9px, 0.85vw, 13px);
    color: var(--ink-dim);
    text-transform: uppercase;
  }

  h1 {
    font-weight: 700;
    font-size: clamp(24px, 3.4vw, 56px);
    letter-spacing: 0.01em;
    line-height: 1.05;
    text-transform: uppercase;
    white-space: nowrap;
  }

  .tagline {
    font-family: var(--font-mono);
    font-size: clamp(9px, 0.8vw, 12px);
    color: var(--ink-dim);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-top: 4px;
  }

  .meta {
    text-align: right;
    display: flex;
    flex-direction: column;
    gap: 6px;
    align-items: flex-end;
    flex-shrink: 0;
  }

  .group-name {
    font-size: clamp(14px, 1.5vw, 24px);
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .live-pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: var(--font-mono);
    font-size: clamp(9px, 0.8vw, 12px);
    letter-spacing: 0.18em;
    color: var(--ink-dim);
    text-transform: uppercase;
  }

  .live-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 2.5s infinite;
  }

  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0    rgba(43,182,115,0.5); }
    70%  { box-shadow: 0 0 0 8px  rgba(43,182,115,0); }
    100% { box-shadow: 0 0 0 0    rgba(43,182,115,0); }
  }

  /* ── MATCHES ── */
  .matches-strip {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: clamp(10px, 1.2vw, 18px);
    margin-bottom: clamp(12px, 1.6vh, 20px);
  }

  .match-card {
    background: var(--surface);
    border: 1px solid var(--hairline);
    border-radius: 12px;
    padding: clamp(10px, 1.2vh, 16px) clamp(14px, 1.5vw, 24px);
    display: flex;
    flex-direction: column;
    gap: clamp(4px, 0.5vh, 7px);
    min-width: 0;
  }

  .match-label {
    font-family: var(--font-mono);
    font-size: clamp(9px, 0.75vw, 11px);
    font-weight: 700;
    letter-spacing: 0.26em;
    text-transform: uppercase;
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: var(--ink-dim);
  }
  .match-card.result .match-label span:first-child { color: var(--green); }
  .match-card.next   .match-label span:first-child { color: var(--us-blue); }

  .match-teams {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: clamp(6px, 0.8vw, 12px);
  }

  .match-team {
    font-weight: 600;
    font-size: clamp(14px, 1.5vw, 23px);
    text-transform: uppercase;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
    min-width: 0;
  }
  .match-team.away { text-align: right; }

  .match-score {
    font-family: var(--font-mono);
    font-weight: 800;
    font-size: clamp(18px, 2vw, 32px);
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
    padding: 0 clamp(6px, 0.8vw, 12px);
  }

  .match-vs {
    font-family: var(--font-mono);
    font-size: clamp(10px, 0.85vw, 13px);
    color: var(--ink-dim);
    letter-spacing: 0.2em;
    padding: 0 clamp(6px, 0.8vw, 12px);
  }

  .match-meta {
    font-family: var(--font-mono);
    font-size: clamp(9px, 0.75vw, 11px);
    color: var(--ink-dim);
    letter-spacing: 0.05em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .countdown {
    font-family: var(--font-mono);
    font-size: clamp(10px, 0.9vw, 13px);
    font-weight: 700;
    color: var(--us-blue);
    letter-spacing: 0.06em;
  }

  /* ── TABLE ── */
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
    background: var(--surface);
    border: 1px solid var(--hairline);
    border-radius: 14px;
    padding: clamp(10px, 1.4vh, 20px) clamp(12px, 1.4vw, 24px);
    overflow: hidden;
  }

  .table-head, .row {
    display: grid;
    grid-template-columns:
      clamp(56px, 5vw, 88px)
      1fr
      clamp(90px, 7.5vw, 140px)
      clamp(80px, 7vw, 120px)
      clamp(82px, 7vw, 125px);
    align-items: center;
    gap: clamp(8px, 1.1vw, 20px);
    padding: 0 clamp(6px, 0.8vw, 14px);
  }

  .table-head {
    font-family: var(--font-mono);
    font-size: clamp(9px, 0.72vw, 11px);
    font-weight: 700;
    letter-spacing: 0.26em;
    text-transform: uppercase;
    color: var(--ink-dim);
    padding-bottom: clamp(8px, 1vh, 12px);
    border-bottom: 1px solid var(--hairline);
  }

  .col-pts, .row .col-pts,
  .col-diff, .row .diff { text-align: right; }
  .col-status, .row .col-status { text-align: center; }

  .rows {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .row {
    flex: 1;
    min-height: 0;
    border-bottom: 1px solid var(--hairline);
    transition: background 0.4s;
  }
  .row:last-child { border-bottom: none; }

  .row.p1 { background: var(--gold-bg); margin: 0 calc(-1 * clamp(12px, 1.4vw, 24px)); padding-left: calc(clamp(6px, 0.8vw, 14px) + clamp(12px, 1.4vw, 24px)); padding-right: calc(clamp(6px, 0.8vw, 14px) + clamp(12px, 1.4vw, 24px)); }

  /* ── POSITION ── */
  .position {
    font-family: var(--font-mono);
    font-weight: 800;
    font-size: clamp(15px, 1.7vw, 28px);
    color: var(--ink-dim);
    font-variant-numeric: tabular-nums;
    display: flex;
    align-items: center;
    gap: 6px;
    line-height: 1;
  }

  .row.p1 .position { color: var(--gold); }
  .row.p2 .position { color: var(--silver); }
  .row.p3 .position { color: var(--bronze); }

  .rank-arrow {
    font-size: clamp(9px, 0.75vw, 12px);
    line-height: 1;
  }
  .up   { color: var(--green); }
  .down { color: var(--red); }
  .same { color: var(--ink-dim); opacity: 0.3; font-size: 0.65em; }

  /* ── PLAYER ── */
  .player { display: flex; flex-direction: column; gap: 1px; min-width: 0; }

  .nickname {
    font-weight: 600;
    font-size: clamp(14px, 1.5vw, 23px);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .fullname {
    font-family: var(--font-mono);
    font-size: clamp(9px, 0.72vw, 11px);
    color: var(--ink-dim);
    letter-spacing: 0.05em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ── POINTS ── */
  .pts {
    font-family: var(--font-mono);
    font-weight: 800;
    font-size: clamp(17px, 2.1vw, 34px);
    font-variant-numeric: tabular-nums;
    text-align: right;
    line-height: 1;
  }
  .pts-unit {
    font-family: var(--font-display);
    font-size: 0.3em;
    letter-spacing: 0.2em;
    color: var(--ink-dim);
    font-weight: 500;
    margin-left: 4px;
    text-transform: uppercase;
    vertical-align: middle;
  }
  .row.p1 .pts { color: var(--gold); }

  /* ── DIFF ── */
  .diff {
    font-family: var(--font-mono);
    font-size: clamp(11px, 0.95vw, 15px);
    font-weight: 500;
    color: var(--ink-dim);
    font-variant-numeric: tabular-nums;
    line-height: 1;
  }
  .row.p1 .diff {
    font-size: clamp(9px, 0.75vw, 11px);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 700;
  }

  /* ── STATUS ── */
  .pill {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: clamp(3px, 0.45vh, 6px) clamp(9px, 0.9vw, 15px);
    border-radius: 999px;
    font-family: var(--font-mono);
    font-size: clamp(9px, 0.72vw, 11px);
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }
  .pill-done    { color: var(--green); border: 1px solid currentColor; }
  .pill-pending { color: var(--ca-red); border: 1px solid currentColor; opacity: 0.85; }

  /* ── FOOTER ── */
  footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: clamp(10px, 1.3vh, 16px);
    font-family: var(--font-mono);
    font-size: clamp(9px, 0.7vw, 11px);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-dim);
  }

  /* ── ERROR ── */
  .error-banner {
    display: none;
    background: rgba(229,69,58,0.08);
    border: 1px solid rgba(229,69,58,0.3);
    color: var(--ca-red);
    padding: 10px 16px;
    border-radius: 10px;
    font-family: var(--font-mono);
    font-size: clamp(10px, 0.85vw, 13px);
    margin-bottom: 12px;
  }
  .error-banner.show { display: block; }

  /* ── SKELETON ── */
  @keyframes shimmer {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }
  .skeleton {
    display: inline-block;
    border-radius: 5px;
    background: linear-gradient(90deg, #1C1C20 25%, #28282E 50%, #1C1C20 75%);
    background-size: 200% 100%;
    animation: shimmer 1.6s infinite;
    color: transparent !important;
    user-select: none;
  }

  /* ── MOBILE ── */
  @media (max-width: 600px) {
    body { height: auto; min-height: 100vh; overflow-y: auto; }
    .rows { overflow: visible; }
    .row { padding-top: 10px; padding-bottom: 10px; }
    .table-head, .row {
      grid-template-columns: 40px 1fr clamp(70px,21vw,95px) clamp(64px,19vw,85px);
    }
    .col-diff, .row .diff { display: none; }
    .matches-strip { grid-template-columns: 1fr; }
    .tagline { display: none; }
    h1 { white-space: normal; }
    .emblem { height: 44px; }
  }

  @media (max-height: 640px) {
    .tagline, .match-meta { display: none; }
  }
</style>
</head>
<body>

<div class="error-banner" id="errorBanner"></div>

<header>
  <div class="header-left">
    <img class="emblem" src="fifa26-emblem-dark.svg" alt="FIFA World Cup 26">
    <div class="title-block">
      <div class="eyebrow">Fantasy League &middot; Standings</div>
      <h1>FIFA World Cup 26&trade;</h1>
      <div class="tagline">Canada &middot; M&eacute;xico &middot; United States &nbsp;&bull;&nbsp; 11 jun &ndash; 19 jul 2026</div>
    </div>
  </div>
  <div class="meta">
    <div class="group-name" id="groupName">MSP Nordics</div>
    <div class="live-pill">
      <span class="live-dot"></span>
      <span>Live &middot; synkas varje minut</span>
    </div>
  </div>
</header>

<div class="matches-strip">
  <div class="match-card result">
    <div class="match-label">
      <span>Senaste resultatet</span>
      <span id="lastMatchGroup"></span>
    </div>
    <div class="match-teams" id="lastMatchTeams">
      <span class="match-team skeleton" style="width:150px">&nbsp;</span>
    </div>
    <div class="match-meta" id="lastMatchMeta"></div>
  </div>
  <div class="match-card next">
    <div class="match-label">
      <span>N&auml;sta match</span>
      <span id="nextMatchGroup"></span>
    </div>
    <div class="match-teams" id="nextMatchTeams">
      <span class="match-team skeleton" style="width:150px">&nbsp;</span>
    </div>
    <div class="match-meta" id="nextMatchMeta"></div>
    <div class="countdown" id="countdown"></div>
  </div>
</div>

<main>
  <div class="table-head">
    <div class="col-pos">Plac.</div>
    <div class="col-name">Spelare</div>
    <div class="col-pts">Po&auml;ng</div>
    <div class="col-diff">Diff</div>
    <div class="col-status">Tippset</div>
  </div>
  <div class="rows" id="rows"></div>
</main>

<footer>
  <div id="lastUpdated">Laddar&hellip;</div>
  <div>copabet.com &middot; msp-nordics</div>
</footer>

<script>
  const PROXY_URL  = "https://odd-credit-02b0.jesper-westin.workers.dev/";
  const REFRESH_MS = 60_000;
  const RANKS_KEY  = 'fifadash_prev_ranks_v2';

  const rowsEl      = document.getElementById('rows');
  const lastUpdEl   = document.getElementById('lastUpdated');
  const groupNameEl = document.getElementById('groupName');
  const errorBanner = document.getElementById('errorBanner');

  /* rank tracking via localStorage — arrows show movement since last visit */
  function loadRanks()       { try { return JSON.parse(localStorage.getItem(RANKS_KEY) || '{}'); } catch { return {}; } }
  function saveRanks(sorted) { const r = {}; sorted.forEach((m,i) => r[pid(m)] = i+1); localStorage.setItem(RANKS_KEY, JSON.stringify(r)); }
  function pid(m)            { return m.firstName + m.lastName; }

  function arrowHtml(key, place, prev) {
    if (!prev[key]) return '<span class="rank-arrow same">&#8212;</span>';
    const d = prev[key] - place;
    if (d > 0) return '<span class="rank-arrow up">&#9650;</span>';
    if (d < 0) return '<span class="rank-arrow down">&#9660;</span>';
    return '<span class="rank-arrow same">&#8212;</span>';
  }

  function render(members) {
    const sorted = [...members].sort((a,b) => {
      if (b.points !== a.points) return b.points - a.points;
      return (a.firstName+a.lastName).localeCompare(b.firstName+b.lastName);
    });

    const prev      = loadRanks();
    const leaderPts = sorted[0]?.points ?? 0;

    rowsEl.innerHTML = '';
    sorted.forEach((m, i) => {
      const place = i + 1;
      const key   = pid(m);
      const name  = m.nickname || `${m.firstName} ${m.lastName}`;
      const medal = ['', '1','2','3'][place] ?? '';

      const diffHtml = place === 1
        ? 'Ledare'
        : `&minus;${leaderPts - m.points} p`;

      const row = document.createElement('div');
      row.className = 'row' + (place <= 3 ? ` p${place}` : '');
      row.innerHTML = `
        <div class="position">${medal || place}${arrowHtml(key, place, prev)}</div>
        <div class="player">
          <div class="nickname">${name}</div>
          ${m.nickname ? `<div class="fullname">${m.firstName} ${m.lastName}</div>` : ''}
        </div>
        <div class="pts">${m.points}<span class="pts-unit">p</span></div>
        <div class="diff">${diffHtml}</div>
        <div class="col-status">
          <span class="pill ${m.scorecardComplete ? 'pill-done' : 'pill-pending'}">
            ${m.scorecardComplete ? 'Klart' : 'Saknas'}
          </span>
        </div>`;
      rowsEl.appendChild(row);
    });

    saveRanks(sorted);
  }

  async function fetchData() {
    try {
      const res = await fetch(PROXY_URL);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      if (!Array.isArray(data.members)) throw new Error('Oväntat svar');
      if (data.group?.name) groupNameEl.textContent = data.group.name;
      render(data.members);
      lastUpdEl.textContent = `Uppdaterad ${new Date().toLocaleTimeString('sv-SE')}`;
      errorBanner.classList.remove('show');
    } catch (err) {
      errorBanner.textContent = `Kunde inte hämta data: ${err.message}`;
      errorBanner.classList.add('show');
      lastUpdEl.textContent = 'Senaste uppdatering misslyckades';
    }
  }

  fetchData();
  setInterval(fetchData, REFRESH_MS);

  /* ── fixtures ── */
  const FIXTURES_URL        = "https://raw.githubusercontent.com/openfootball/worldcup.json/master/2026/worldcup.json";
  const FIXTURES_REFRESH_MS = 10 * 60_000;

  let nextMatchDate = null;

  function teamStr(t)   { return typeof t === 'string' ? t : (t?.name || t?.code || '?'); }
  function groundStr(g) { return typeof g === 'string' ? g : (g?.name ? `${g.name}${g.city ? ', '+g.city : ''}` : ''); }
  function fmtDate(d)   { return new Date(d).toLocaleDateString('sv-SE', { weekday:'short', day:'numeric', month:'short' }); }

  function renderFixtures(data) {
    const matches  = data.matches || [];
    const played   = matches.filter(m => m.score && m.score.ft);
    const upcoming = matches.filter(m => !m.score);

    const lastTeamsEl = document.getElementById('lastMatchTeams');
    const lastMetaEl  = document.getElementById('lastMatchMeta');
    const lastGrpEl   = document.getElementById('lastMatchGroup');
    const nextTeamsEl = document.getElementById('nextMatchTeams');
    const nextMetaEl  = document.getElementById('nextMatchMeta');
    const nextGrpEl   = document.getElementById('nextMatchGroup');

    if (played.length > 0) {
      const l = played[played.length - 1];
      const [s1, s2] = l.score.ft;
      lastTeamsEl.innerHTML = `
        <span class="match-team">${teamStr(l.team1)}</span>
        <span class="match-score">${s1}&ndash;${s2}</span>
        <span class="match-team away">${teamStr(l.team2)}</span>`;
      lastMetaEl.textContent = fmtDate(l.date) + (groundStr(l.ground) ? ' · ' + groundStr(l.ground) : '');
      lastGrpEl.textContent  = l.group || l.round || '';
    } else {
      lastTeamsEl.innerHTML  = `<span class="match-team">Inga matcher spelade än</span>`;
      lastMetaEl.textContent = 'Avspark 11 juni!';
      lastGrpEl.textContent  = '';
    }

    if (upcoming.length > 0) {
      const n = upcoming[0];
      nextTeamsEl.innerHTML = `
        <span class="match-team">${teamStr(n.team1)}</span>
        <span class="match-vs">VS</span>
        <span class="match-team away">${teamStr(n.team2)}</span>`;
      nextMetaEl.textContent = fmtDate(n.date) + (n.time ? ' · ' + n.time : '') + (groundStr(n.ground) ? ' · ' + groundStr(n.ground) : '');
      nextGrpEl.textContent  = n.group || n.round || '';
      nextMatchDate = n.time ? new Date(`${n.date}T${n.time}`) : new Date(n.date);
    } else {
      nextTeamsEl.innerHTML  = `<span class="match-team">Turneringen är klar!</span>`;
      nextMetaEl.textContent = '';
      nextMatchDate          = null;
    }
  }

  async function fetchFixtures() {
    try {
      const res = await fetch(FIXTURES_URL);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      renderFixtures(await res.json());
    } catch {
      document.getElementById('lastMatchTeams').innerHTML = `<span class="match-team">Matchdata ej tillgänglig</span>`;
      document.getElementById('nextMatchTeams').innerHTML = '';
    }
  }

  fetchFixtures();
  setInterval(fetchFixtures, FIXTURES_REFRESH_MS);

  /* ── countdown ── */
  const countdownEl = document.getElementById('countdown');

  function tick() {
    if (!nextMatchDate || isNaN(nextMatchDate)) { countdownEl.textContent = ''; return; }
    const ms = nextMatchDate - Date.now();
    if (ms <= 0) { countdownEl.textContent = '⚽ Pågår nu'; return; }
    const d = Math.floor(ms / 86_400_000);
    const h = Math.floor((ms % 86_400_000) / 3_600_000);
    const m = Math.floor((ms % 3_600_000)  /    60_000);
    const s = Math.floor((ms %    60_000)  /     1_000);
    countdownEl.textContent = d > 0
      ? `Avspark om ${d}d ${h}h ${m}m`
      : h > 0
        ? `Avspark om ${h}h ${m}m ${s}s`
        : `Avspark om ${m}m ${s}s`;
  }

  tick();
  setInterval(tick, 1000);
</script>
</body>
</html>
