<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MSP Nordics — Fantasy World Cup 2026</title>
<style>
  @font-face {
    font-family: 'Bebas';
    src: local('Arial');
  }

  :root {
    --bg: #0a1410;
    --bg-2: #0f1d17;
    --pitch-line: rgba(255,255,255,0.04);
    --gold: #e8c547;
    --gold-soft: #f3da8a;
    --green: #2bb673;
    --green-glow: rgba(43,182,115,0.25);
    --text: #f4f1e8;
    --text-dim: #8fa399;
    --row-bg: #11231b;
    --row-bg-alt: #0d1d16;
    --row-leader: #16301f;
    --border: #1d3329;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%;
    height: 100%;
    background: var(--bg);
    overflow: hidden;
  }

  body {
    font-family: 'Roboto Slab', 'Georgia', serif;
    color: var(--text);
    background:
      repeating-linear-gradient(
        0deg,
        transparent,
        transparent 79px,
        var(--pitch-line) 79px,
        var(--pitch-line) 80px
      ),
      radial-gradient(ellipse at 50% -10%, rgba(43,182,115,0.12) 0%, transparent 55%),
      var(--bg);
    display: flex;
    flex-direction: column;
    height: 100vh;
    padding: clamp(16px, 2.5vw, 40px);
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-bottom: clamp(12px, 1.8vh, 24px);
    border-bottom: 2px solid var(--border);
    margin-bottom: clamp(12px, 1.8vh, 24px);
  }

  .title-block {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .eyebrow {
    font-family: 'Arial Narrow', Arial, sans-serif;
    font-weight: 700;
    letter-spacing: 0.45em;
    font-size: clamp(11px, 1.1vw, 16px);
    color: var(--green);
    text-transform: uppercase;
  }

  h1 {
    font-family: 'Arial Black', Arial, sans-serif;
    font-weight: 900;
    font-size: clamp(28px, 4.2vw, 64px);
    letter-spacing: 0.04em;
    line-height: 1;
    color: var(--text);
    text-transform: uppercase;
  }

  h1 span {
    color: var(--gold);
  }

  .meta {
    text-align: right;
    display: flex;
    flex-direction: column;
    gap: 6px;
    align-items: flex-end;
  }

  .group-name {
    font-family: 'Arial Black', Arial, sans-serif;
    font-size: clamp(16px, 1.8vw, 26px);
    font-weight: 900;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text);
  }

  .live-dot {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: 'Arial Narrow', Arial, sans-serif;
    font-size: clamp(11px, 1.1vw, 15px);
    letter-spacing: 0.25em;
    color: var(--text-dim);
    text-transform: uppercase;
    font-weight: 700;
  }

  .live-dot::before {
    content: '';
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 0 0 var(--green-glow);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 var(--green-glow); }
    70% { box-shadow: 0 0 0 12px rgba(43,182,115,0); }
    100% { box-shadow: 0 0 0 0 rgba(43,182,115,0); }
  }

  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }

  .table-head, .row {
    display: grid;
    grid-template-columns: clamp(64px, 5.5vw, 100px) clamp(56px, 5vw, 84px) 1fr clamp(120px, 9vw, 180px) clamp(100px, 8vw, 150px);
    align-items: center;
    gap: clamp(12px, 1.5vw, 28px);
    padding: 0 clamp(16px, 1.6vw, 28px);
  }

  .table-head {
    font-family: 'Arial Narrow', Arial, sans-serif;
    font-size: clamp(11px, 1vw, 15px);
    font-weight: 700;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--text-dim);
    padding-bottom: clamp(8px, 1.2vh, 16px);
    padding-top: 4px;
  }

  .table-head .col-points, .row .col-points { text-align: right; }
  .table-head .col-status, .row .col-status { text-align: center; }

  .rows {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: clamp(6px, 0.8vh, 10px);
    overflow: hidden;
  }

  .row {
    background: var(--row-bg);
    border: 1px solid var(--border);
    border-radius: 14px;
    flex: 1;
    min-height: 0;
    transition: background 0.4s ease, transform 0.4s ease;
  }

  .row.leader {
    background: var(--row-leader);
    border-color: rgba(232,197,71,0.35);
    box-shadow: 0 0 0 1px rgba(232,197,71,0.08), 0 8px 24px -12px rgba(232,197,71,0.25);
  }

  .row:nth-child(even):not(.leader) {
    background: var(--row-bg-alt);
  }

  .position {
    font-family: 'Arial Black', Arial, sans-serif;
    font-weight: 900;
    font-size: clamp(20px, 2.4vw, 40px);
    color: var(--text-dim);
    font-variant-numeric: tabular-nums;
  }

  .row.leader .position {
    color: var(--gold);
  }

  .position .medal {
    font-size: 0.6em;
    margin-left: 4px;
  }

  .avatar {
    width: clamp(36px, 3.4vw, 56px);
    height: clamp(36px, 3.4vw, 56px);
    border-radius: 50%;
    background: var(--bg-2);
    border: 2px solid var(--border);
    object-fit: cover;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Arial Black', Arial, sans-serif;
    font-weight: 900;
    color: var(--text-dim);
    font-size: clamp(14px, 1.4vw, 22px);
  }

  .row.leader .avatar {
    border-color: var(--gold);
  }

  .player {
    display: flex;
    flex-direction: column;
    gap: 2px;
    min-width: 0;
  }

  .nickname {
    font-family: 'Arial Black', Arial, sans-serif;
    font-weight: 900;
    font-size: clamp(15px, 1.7vw, 26px);
    letter-spacing: 0.01em;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .fullname {
    font-family: 'Arial Narrow', Arial, sans-serif;
    font-size: clamp(11px, 1vw, 15px);
    color: var(--text-dim);
    letter-spacing: 0.05em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .points {
    font-family: 'Arial Black', Arial, sans-serif;
    font-weight: 900;
    font-size: clamp(22px, 2.8vw, 46px);
    font-variant-numeric: tabular-nums;
    color: var(--text);
  }

  .row.leader .points {
    color: var(--gold);
  }

  .points .pts-label {
    font-family: 'Arial Narrow', Arial, sans-serif;
    font-size: 0.32em;
    letter-spacing: 0.25em;
    color: var(--text-dim);
    font-weight: 700;
    margin-left: 6px;
    text-transform: uppercase;
  }

  .status-pill {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: clamp(4px, 0.6vh, 8px) clamp(10px, 1vw, 18px);
    border-radius: 999px;
    font-family: 'Arial Narrow', Arial, sans-serif;
    font-size: clamp(10px, 0.95vw, 14px);
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    white-space: nowrap;
  }

  .status-complete {
    background: rgba(43,182,115,0.12);
    color: var(--green);
    border: 1px solid rgba(43,182,115,0.3);
  }

  .status-pending {
    background: rgba(232,197,71,0.08);
    color: var(--gold-soft);
    border: 1px solid rgba(232,197,71,0.25);
  }

  footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: clamp(10px, 1.5vh, 18px);
    font-family: 'Arial Narrow', Arial, sans-serif;
    font-size: clamp(10px, 0.95vw, 14px);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-dim);
    border-top: 2px solid var(--border);
    margin-top: clamp(12px, 1.8vh, 24px);
  }

  .error-banner {
    display: none;
    background: rgba(220,80,80,0.1);
    border: 1px solid rgba(220,80,80,0.3);
    color: #f0a8a8;
    padding: 12px 18px;
    border-radius: 10px;
    font-family: 'Arial Narrow', Arial, sans-serif;
    font-size: clamp(11px, 1vw, 14px);
    letter-spacing: 0.05em;
    margin-bottom: 12px;
    text-transform: none;
  }

  .error-banner.show { display: block; }
</style>
</head>
<body>

<div class="error-banner" id="errorBanner"></div>

<header>
  <div class="title-block">
    <div class="eyebrow">Fantasy League · Standings</div>
    <h1>FIFA WORLD <span>CUP</span> 2026</h1>
  </div>
  <div class="meta">
    <div class="group-name" id="groupName">MSP Nordics</div>
    <div class="live-dot" id="liveDot">Updates live</div>
  </div>
</header>

<main>
  <div class="table-head">
    <div class="col-pos">Plac.</div>
    <div></div>
    <div class="col-name">Spelare</div>
    <div class="col-points">Poäng</div>
    <div class="col-status">Tippset</div>
  </div>
  <div class="rows" id="rows">
    <!-- rows injected here -->
  </div>
</main>

<footer>
  <div id="lastUpdated">Laddar...</div>
  <div>copabet.com · msp-nordics</div>
</footer>

<script>
  const TOURNAMENT_ID = 17;
  const SLUG = "msp-nordics";
  const REFRESH_MS = 60000; // 1 minute

  const membersUrl = `https://app-api.copabet.com/trpc/groups.showMembers?batch=1&input=${encodeURIComponent(JSON.stringify({"0":{tournamentId: TOURNAMENT_ID, slug: SLUG}}))}`;
  const groupUrl = `https://app-api.copabet.com/trpc/groups.show?batch=1&input=${encodeURIComponent(JSON.stringify({"0":{tournamentId: TOURNAMENT_ID, slug: SLUG}}))}`;

  const rowsEl = document.getElementById('rows');
  const lastUpdatedEl = document.getElementById('lastUpdated');
  const groupNameEl = document.getElementById('groupName');
  const errorBanner = document.getElementById('errorBanner');

  function initials(first, last) {
    return ((first?.[0] || '') + (last?.[0] || '')).toUpperCase();
  }

  function avatarUrl(avatar) {
    if (!avatar) return null;
    if (avatar.startsWith('http')) return avatar;
    return `https://imagedelivery.net/j9SaBXus23OmWjb-2MNNhw/${avatar}/80x80`;
  }

  function render(members) {
    // Sort by points desc, then by position asc as tiebreak fallback
    const sorted = [...members].sort((a, b) => {
      if (b.points !== a.points) return b.points - a.points;
      return (a.firstName + a.lastName).localeCompare(b.firstName + b.lastName);
    });

    rowsEl.innerHTML = '';

    sorted.forEach((m, i) => {
      const place = i + 1;
      const isLeader = place === 1;
      const name = m.nickname || `${m.firstName} ${m.lastName}`;
      const fullname = `${m.firstName} ${m.lastName}`;
      const av = avatarUrl(m.avatar);

      const row = document.createElement('div');
      row.className = 'row' + (isLeader ? ' leader' : '');

      let medal = '';
      if (place === 1) medal = ' 🥇';
      else if (place === 2) medal = ' 🥈';
      else if (place === 3) medal = ' 🥉';

      const avatarInner = av
        ? `<img class="avatar" src="${av}" alt="">`
        : `<div class="avatar">${initials(m.firstName, m.lastName)}</div>`;

      const statusClass = m.scorecardComplete ? 'status-complete' : 'status-pending';
      const statusText = m.scorecardComplete ? 'Klart' : 'Saknas';

      row.innerHTML = `
        <div class="position">${place}<span class="medal">${medal}</span></div>
        ${avatarInner}
        <div class="player">
          <div class="nickname">${name}</div>
          ${m.nickname ? `<div class="fullname">${fullname}</div>` : ''}
        </div>
        <div class="points">${m.points}<span class="pts-label">poäng</span></div>
        <div class="col-status"><span class="status-pill ${statusClass}">${statusText}</span></div>
      `;

      rowsEl.appendChild(row);
    });
  }

  async function fetchData() {
    try {
      const [membersRes, groupRes] = await Promise.all([
        fetch(membersUrl),
        fetch(groupUrl)
      ]);

      if (!membersRes.ok) throw new Error(`Members request failed: ${membersRes.status}`);

      const membersJson = await membersRes.json();
      const members = membersJson[0]?.result?.data;

      if (!Array.isArray(members)) throw new Error('Unexpected response shape');

      if (groupRes.ok) {
        const groupJson = await groupRes.json();
        const groupData = groupJson[0]?.result?.data;
        if (groupData?.name) groupNameEl.textContent = groupData.name;
      }

      render(members);

      const now = new Date();
      lastUpdatedEl.textContent = `Senast uppdaterad ${now.toLocaleTimeString('sv-SE')}`;
      errorBanner.classList.remove('show');
    } catch (err) {
      errorBanner.textContent = `Kunde inte hämta data: ${err.message}. (Om detta beror på CORS, se kommentar i koden för proxy-lösning.)`;
      errorBanner.classList.add('show');
      lastUpdatedEl.textContent = `Senaste lyckade uppdatering misslyckades`;
    }
  }

  fetchData();
  setInterval(fetchData, REFRESH_MS);
</script>

</body>
</html>
