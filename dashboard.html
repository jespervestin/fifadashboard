<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MSP Nordics — FIFA World Cup 26</title>
<link rel="icon" href="fifa26-emblem.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    /* FIFA 26 — clean dark identity */
    --bg:          #0C0C0E;
    --surface:     #141417;
    --ink:         #F2F1ED;
    --ink-soft:    #B5B3AC;
    --ink-dim:     #71716C;
    --hairline:    #232328;

    /* United 2026 host colors (brightened for dark bg) */
    --mx-green:    #00A86B;
    --ca-red:      #E5453A;
    --us-blue:     #4D9FE8;

    --gold:        #E8C547;
    --gold-bg:     #1D1909;
    --silver:      #A8B2BC;
    --bronze:      #C8853D;
    --green:       #2BB673;
    --red:         #E5453A;

    --font-display: 'Oswald', 'Arial Narrow', Arial, sans-serif;
    --font-mono:    'JetBrains Mono', 'Courier New', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html { height: 100%; }

  body {
    font-family: var(--font-display);
    color: var(--ink);
    background: var(--bg);
    display: flex;
    flex-direction: column;
    height: 100vh;
    padding: clamp(16px, 2.2vw, 40px);
    overflow: hidden;
  }

  /* United 2026 tri-color line, top of page */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg,
      var(--mx-green) 0%,   var(--mx-green) 33.3%,
      var(--ca-red)   33.3%, var(--ca-red)  66.6%,
      var(--us-blue)  66.6%, var(--us-blue) 100%);
    z-index: 10;
  }

  /* ── HEADER ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
    padding-bottom: clamp(12px, 1.6vh, 22px);
    border-bottom: 1px solid var(--hairline);
    margin-bottom: clamp(12px, 1.6vh, 22px);
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: clamp(14px, 1.8vw, 28px);
    min-width: 0;
  }

  .emblem {
    flex-shrink: 0;
    height: clamp(52px, 7vw, 96px);
    width: auto;
    display: block;
  }

  .title-block {
    display: flex;
    flex-direction: column;
    gap: 2px;
    min-width: 0;
  }

  .eyebrow {
    font-weight: 600;
    letter-spacing: 0.4em;
    font-size: clamp(9px, 0.85vw, 13px);
    color: var(--ink-dim);
    text-transform: uppercase;
  }

  h1 {
    font-weight: 700;
    font-size: clamp(24px, 3.4vw, 56px);
    letter-spacing: 0.01em;
    line-height: 1.05;
    text-transform: uppercase;
    white-space: nowrap;
  }

  .tagline {
    font-family: var(--font-mono);
    font-size: clamp(9px, 0.8vw, 12px);
    color: var(--ink-dim);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-top: 4px;
  }

  .meta {
    text-align: right;
    display: flex;
    flex-direction: column;
    gap: 6px;
    align-items: flex-end;
    flex-shrink: 0;
  }

  .msp-logo {
    height: clamp(40px, 5.5vh, 72px);
    width: auto;
    display: block;
  }

  /* ── MATCHES ── */
  .matches-strip {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: clamp(10px, 1.2vw, 18px);
    margin-bottom: clamp(12px, 1.6vh, 20px);
  }

  .match-card {
    background: var(--surface);
    border: 1px solid var(--hairline);
    border-radius: 14px;
    padding: clamp(12px, 1.6vh, 22px) clamp(16px, 1.8vw, 28px);
    display: flex;
    flex-direction: column;
    gap: clamp(8px, 1vh, 13px);
    min-width: 0;
    position: relative;
    overflow: hidden;
  }

  .match-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }
  .match-card.result::before { background: linear-gradient(90deg, var(--green), transparent 80%); }
  .match-card.next::before   { background: linear-gradient(90deg, var(--gold),  transparent 80%); }

  .match-label {
    font-family: var(--font-mono);
    font-size: clamp(9px, 0.75vw, 11px);
    font-weight: 700;
    letter-spacing: 0.26em;
    text-transform: uppercase;
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: var(--ink-dim);
  }
  .match-card.result .match-label .lbl { color: var(--green); }
  .match-card.next   .match-label .lbl { color: var(--gold-soft); }

  .match-badge {
    font-family: var(--font-mono);
    font-size: clamp(8px, 0.68vw, 10px);
    font-weight: 700;
    letter-spacing: 0.14em;
    padding: 2px 7px;
    border-radius: 999px;
    border: 1px solid var(--hairline);
    color: var(--ink-dim);
    text-transform: uppercase;
  }

  /* 3-column scoreboard grid */
  .match-teams {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: clamp(8px, 1vw, 16px);
  }

  .match-team {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: clamp(5px, 0.5vw, 8px);
    min-width: 0;
  }
  .match-team.away { align-items: center; }

  .flag {
    height: clamp(36px, 4vh, 56px);
    width: auto;
    border-radius: 4px;
    flex-shrink: 0;
    display: block;
    object-fit: cover;
    box-shadow: 0 2px 8px rgba(0,0,0,0.45);
  }

  .team-name {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: clamp(14px, 1.55vw, 24px);
    text-transform: uppercase;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--ink-soft);
    letter-spacing: 0.01em;
  }
  .team-name.winner { color: var(--ink); font-weight: 700; }
  .team-name.loser  { color: var(--ink-dim); }

  .match-center {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    flex-shrink: 0;
  }

  .match-score {
    font-family: var(--font-mono);
    font-weight: 800;
    font-size: clamp(26px, 3vw, 48px);
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
    line-height: 1;
    letter-spacing: 0.04em;
    color: var(--ink);
  }
  .match-score.live { color: var(--ca-red); }

  .match-vs {
    font-family: var(--font-mono);
    font-weight: 800;
    font-size: clamp(18px, 2.2vw, 36px);
    color: var(--ink-dim);
    letter-spacing: 0.1em;
    line-height: 1;
  }

  .match-meta {
    font-family: var(--font-mono);
    font-size: clamp(9px, 0.75vw, 11px);
    color: var(--ink-dim);
    letter-spacing: 0.05em;
    text-align: center;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .countdown {
    font-family: var(--font-mono);
    font-weight: 700;
    font-size: clamp(13px, 1.3vw, 20px);
    color: var(--gold);
    letter-spacing: 0.04em;
    text-align: center;
    line-height: 1;
  }

  /* ── TABLE ── */
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
    background: var(--surface);
    border: 1px solid var(--hairline);
    border-radius: 14px;
    padding: clamp(10px, 1.4vh, 20px) clamp(12px, 1.4vw, 24px);
    overflow: hidden;
  }

  .table-head, .row {
    display: grid;
    grid-template-columns:
      clamp(56px, 5vw, 88px)
      minmax(120px, 22%)
      1fr
      clamp(90px, 7.5vw, 140px)
      clamp(80px, 7vw, 120px);
    align-items: center;
    gap: clamp(8px, 1.1vw, 20px);
    padding: 0 clamp(6px, 0.8vw, 14px);
  }

  .table-head {
    font-family: var(--font-mono);
    font-size: clamp(9px, 0.72vw, 11px);
    font-weight: 700;
    letter-spacing: 0.26em;
    text-transform: uppercase;
    color: var(--ink-dim);
    padding-bottom: clamp(8px, 1vh, 12px);
    border-bottom: 1px solid var(--hairline);
  }

  .col-pts, .row .col-pts,
  .col-diff, .row .diff { text-align: right; }

  /* ── POINTS BAR ── */
  .pts-bar {
    display: flex;
    align-items: center;
    gap: clamp(6px, 0.8vw, 12px);
    min-width: 0;
  }

  .pts-bar-track {
    flex: 1;
    height: clamp(6px, 0.7vh, 10px);
    background: var(--hairline);
    border-radius: 999px;
    overflow: hidden;
  }

  .pts-bar-fill {
    height: 100%;
    border-radius: 999px;
    background: var(--ink-dim);
    transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    min-width: 2px;
  }

  .row.p1 .pts-bar-fill { background: var(--gold); box-shadow: 0 0 8px rgba(232,197,71,0.5); }
  .row.p2 .pts-bar-fill { background: var(--silver); }
  .row.p3 .pts-bar-fill { background: var(--bronze); }

  .rows {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .row {
    flex: 1;
    min-height: 0;
    border-bottom: 1px solid var(--hairline);
    transition: background 0.4s;
  }
  .row:last-child { border-bottom: none; }

  .row.p1 { background: var(--gold-bg); margin: 0 calc(-1 * clamp(12px, 1.4vw, 24px)); padding-left: calc(clamp(6px, 0.8vw, 14px) + clamp(12px, 1.4vw, 24px)); padding-right: calc(clamp(6px, 0.8vw, 14px) + clamp(12px, 1.4vw, 24px)); }

  /* ── POSITION ── */
  .position {
    font-family: var(--font-mono);
    font-weight: 800;
    font-size: clamp(15px, 1.7vw, 28px);
    color: var(--ink-dim);
    font-variant-numeric: tabular-nums;
    display: flex;
    align-items: center;
    gap: 6px;
    line-height: 1;
  }

  .row.p1 .position { color: var(--gold); }
  .row.p2 .position { color: var(--silver); }
  .row.p3 .position { color: var(--bronze); }

  .rank-arrow {
    font-size: clamp(9px, 0.75vw, 12px);
    line-height: 1;
  }
  .up   { color: var(--green); }
  .down { color: var(--red); }
  .same { color: var(--ink-dim); opacity: 0.3; font-size: 0.65em; }

  /* ── PLAYER ── */
  .player { display: flex; flex-direction: column; gap: 1px; min-width: 0; }

  .nickname {
    font-weight: 600;
    font-size: clamp(14px, 1.5vw, 23px);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .fullname {
    font-family: var(--font-mono);
    font-size: clamp(9px, 0.72vw, 11px);
    color: var(--ink-dim);
    letter-spacing: 0.05em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ── POINTS ── */
  .pts {
    font-family: var(--font-mono);
    font-weight: 800;
    font-size: clamp(17px, 2.1vw, 34px);
    font-variant-numeric: tabular-nums;
    text-align: right;
    line-height: 1;
  }
  .pts-unit {
    font-family: var(--font-display);
    font-size: 0.3em;
    letter-spacing: 0.2em;
    color: var(--ink-dim);
    font-weight: 500;
    margin-left: 4px;
    text-transform: uppercase;
    vertical-align: middle;
  }
  .row.p1 .pts { color: var(--gold); }

  /* ── DIFF ── */
  .diff {
    font-family: var(--font-mono);
    font-size: clamp(11px, 0.95vw, 15px);
    font-weight: 500;
    color: var(--ink-dim);
    font-variant-numeric: tabular-nums;
    line-height: 1;
  }
  .row.p1 .diff {
    font-size: clamp(9px, 0.75vw, 11px);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 700;
  }

  /* ── FOOTER ── */
  footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: clamp(10px, 1.3vh, 16px);
    font-family: var(--font-mono);
    font-size: clamp(9px, 0.7vw, 11px);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-dim);
  }

  /* ── ERROR ── */
  .error-banner {
    display: none;
    background: rgba(229,69,58,0.08);
    border: 1px solid rgba(229,69,58,0.3);
    color: var(--ca-red);
    padding: 10px 16px;
    border-radius: 10px;
    font-family: var(--font-mono);
    font-size: clamp(10px, 0.85vw, 13px);
    margin-bottom: 12px;
  }
  .error-banner.show { display: block; }

  /* ── SKELETON ── */
  @keyframes shimmer {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }
  .skeleton {
    display: inline-block;
    border-radius: 5px;
    background: linear-gradient(90deg, #1C1C20 25%, #28282E 50%, #1C1C20 75%);
    background-size: 200% 100%;
    animation: shimmer 1.6s infinite;
    color: transparent !important;
    user-select: none;
  }

  /* ── MOBILE ── */
  @media (max-width: 600px) {
    body { height: auto; min-height: 100vh; overflow-y: auto; }
    .rows { overflow: visible; }
    .row { padding-top: 10px; padding-bottom: 10px; }
    .table-head, .row {
      grid-template-columns: 40px 1fr clamp(70px,21vw,95px) clamp(56px,17vw,80px);
    }
    .pts-bar, .col-bar { display: none; }
    .matches-strip { grid-template-columns: 1fr; }
    .tagline { display: none; }
    h1 { white-space: normal; }
    .emblem { height: 44px; }
  }

  @media (max-height: 640px) {
    .tagline, .match-meta { display: none; }
  }
</style>
</head>

<div class="error-banner" id="errorBanner"></div>

    <img class="emblem" src="fifa26-emblem-dark.svg" alt="FIFA World Cup 26">
    <div class="title-block">
      <div class="eyebrow">Fantasy League &middot; Standings</div>
      <h1>FIFA World Cup 26&trade;</h1>

    </div>
  </div>

<script>
  const PROXY_URL  = "https://odd-credit-02b0.jesper-westin.workers.dev/";
  const REFRESH_MS = 60_000;
  const RANKS_KEY  = 'fifadash_prev_ranks_v2';

  const rowsEl      = document.getElementById('rows');
  const lastUpdEl   = document.getElementById('lastUpdated');
  const errorBanner = document.getElementById('errorBanner');

  /* rank tracking via localStorage — arrows show movement since last visit */
  function loadRanks()       { try { return JSON.parse(localStorage.getItem(RANKS_KEY) || '{}'); } catch { return {}; } }
  function saveRanks(sorted, places) { const r = {}; sorted.forEach((m,i) => r[pid(m)] = places[i]); localStorage.setItem(RANKS_KEY, JSON.stringify(r)); }
  function pid(m)            { return m.firstName + m.lastName; }

  function arrowHtml(key, place, prev) {
    if (!prev[key]) return '';
    const d = prev[key] - place;
    if (d > 0) return '<span class="rank-arrow up">&#9650;</span>';
    if (d < 0) return '<span class="rank-arrow down">&#9660;</span>';
    return '';
  }

  function render(members) {
    const sorted = [...members].sort((a,b) => {
      if (b.points !== a.points) return b.points - a.points;
      return (a.firstName+a.lastName).localeCompare(b.firstName+b.lastName);
    });

    const prev      = loadRanks();
    const leaderPts = sorted[0]?.points ?? 0;

    /* dense ranking baserat på unika poängnivåer (1,1,2,2,3) */
    const uniquePts = [...new Set(sorted.map(m => m.points))].sort((a,b) => b-a);
    const places    = sorted.map(m => uniquePts.indexOf(m.points) + 1);

    rowsEl.innerHTML = '';
    sorted.forEach((m, i) => {
      const place = places[i];
      const tied  = sorted.filter(x => x.points === m.points).length > 1;
      const key   = pid(m);
      const name  = m.nickname || `${m.firstName} ${m.lastName}`;
      const diffHtml = place === 1 && !tied
        ? 'Ledare'
        : place === 1 && tied
          ? 'Delad ledning'
          : `&minus;${leaderPts - m.points} p`;

      const pct = leaderPts > 0 ? Math.round((m.points / leaderPts) * 100) : 0;

      const row = document.createElement('div');
      row.className = 'row' + (place <= 3 ? ` p${place}` : '');
      row.innerHTML = `
        <div class="position">${place}${arrowHtml(key, place, prev)}</div>
        <div class="player">
          <div class="nickname">${name}</div>
          ${m.nickname ? `<div class="fullname">${m.firstName} ${m.lastName}</div>` : ''}
        </div>
        <div class="pts-bar">
          <div class="pts-bar-track">
            <div class="pts-bar-fill" style="width:${pct}%"></div>
          </div>
        </div>
        <div class="pts">${m.points}<span class="pts-unit">p</span></div>
        <div class="diff">${diffHtml}</div>`;
      rowsEl.appendChild(row);
    });

    saveRanks(sorted, places);
  }

  async function fetchData() {
    try {
      const res = await fetch(PROXY_URL);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      if (!Array.isArray(data.members)) throw new Error('Oväntat svar');
      render(data.members);
      lastUpdEl.textContent = `Uppdaterad ${new Date().toLocaleTimeString('sv-SE')}`;
      errorBanner.classList.remove('show');
    } catch (err) {
      errorBanner.textContent = `Kunde inte hämta data: ${err.message}`;
      errorBanner.classList.add('show');
      lastUpdEl.textContent = 'Senaste uppdatering misslyckades';
    }
  }

  fetchData();
  setInterval(fetchData, REFRESH_MS);

    const nextTeamsEl = document.getElementById('nextMatchTeams');
    const nextMetaEl  = document.getElementById('nextMatchMeta');
    const nextGrpEl   = document.getElementById('nextMatchGroup');

    const sorted   = [...events].sort((a,b) => new Date(a.date) - new Date(b.date));
    const played   = sorted.filter(e => e.status.type.completed);
    const live     = sorted.filter(e => e.status.type.state === 'in');
    const upcoming = sorted.filter(e => !e.status.type.completed && e.status.type.state !== 'in');

    /* ── last result ── */
    if (played.length > 0) {
      const ev   = played[played.length - 1];
      const comp = ev.competitions[0];
      const home = comp.competitors.find(c => c.homeAway === 'home') || comp.competitors[0];
      const away = comp.competitors.find(c => c.homeAway === 'away') || comp.competitors[1];
      const hs = parseInt(home.score), as = parseInt(away.score);
      const homeCls = hs > as ? 'winner' : hs < as ? 'loser' : '';
      const awayCls = as > hs ? 'winner' : as < hs ? 'loser' : '';
      lastTeamsEl.innerHTML = `
        <div class="match-team">${flagImg(home.team.displayName)}<span class="team-name ${homeCls}">${home.team.displayName}</span></div>
        <div class="match-center"><div class="match-score">${home.score}&thinsp;&ndash;&thinsp;${away.score}</div></div>
        <div class="match-team away">${flagImg(away.team.displayName)}<span class="team-name ${awayCls}">${away.team.displayName}</span></div>`;
      lastMetaEl.textContent = fmtDate(ev.date) + (comp.venue?.fullName ? ' · ' + comp.venue.fullName : '');
      lastGrpEl.textContent  = comp.notes?.[0]?.text || '';
    } else {
      lastTeamsEl.innerHTML  = `<span class="match-team">Inga matcher spelade än</span>`;
      lastMetaEl.textContent = 'Avspark 11 juni!';
      lastGrpEl.textContent  = '';
    }

    /* ── next / live ── */
    const next   = live[0] ?? upcoming[0];
    const isLive = live.length > 0 && next === live[0];

    if (next) {
      const comp   = next.competitions[0];
      const home   = comp.competitors.find(c => c.homeAway === 'home') || comp.competitors[0];
      const away   = comp.competitors.find(c => c.homeAway === 'away') || comp.competitors[1];
      const clock  = isLive ? ` · ${comp.status?.displayClock ?? ''}` : '';

      nextTeamsEl.innerHTML = isLive
        ? `<div class="match-team">${flagImg(home.team.displayName)}<span class="team-name">${home.team.displayName}</span></div>
           <div class="match-center"><div class="match-score live">${home.score}&thinsp;&ndash;&thinsp;${away.score}</div></div>
           <div class="match-team away">${flagImg(away.team.displayName)}<span class="team-name">${away.team.displayName}</span></div>`
        : `<div class="match-team">${flagImg(home.team.displayName)}<span class="team-name">${home.team.displayName}</span></div>
           <div class="match-center"><div class="match-vs">VS</div></div>
           <div class="match-team away">${flagImg(away.team.displayName)}<span class="team-name">${away.team.displayName}</span></div>`;

      nextMetaEl.textContent = fmtDate(next.date) + ' · ' + fmtTime(next.date) + clock + (comp.venue?.fullName ? ' · ' + comp.venue.fullName : '');
      nextGrpEl.textContent  = isLive ? '⚽ Live' : (comp.notes?.[0]?.text || '');
      nextMatchDate          = isLive ? null : new Date(next.date);
    } else {
      nextTeamsEl.innerHTML  = `<span class="match-team">Turneringen är klar!</span>`;
      nextMetaEl.textContent = '';
      nextGrpEl.textContent  = '';
      nextMatchDate          = null;
    }
  }

  async function fetchFixtures() {
    try {
      const now  = new Date();
      const from = new Date(now); from.setDate(from.getDate() - 7);
      const to   = new Date(now); to.setDate(to.getDate() + 14);
      const url  = `https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=${espnDateStr(from)}-${espnDateStr(to)}&limit=100`;
      const res  = await fetch(url);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      renderFixtures(data.events || []);
    } catch (err) {
      document.getElementById('lastMatchTeams').innerHTML = `<span class="match-team">Matchdata ej tillgänglig</span>`;
      document.getElementById('nextMatchTeams').innerHTML = '';
    }
  }

  fetchFixtures();
  setInterval(fetchFixtures, FIXTURES_REFRESH_MS);

  /* ── countdown ── */
  const countdownEl = document.getElementById('countdown');

  function tick() {
    if (!nextMatchDate || isNaN(nextMatchDate)) { countdownEl.textContent = ''; return; }
    const ms = nextMatchDate - Date.now();
    if (ms <= 0) { countdownEl.textContent = '⚽ Pågår nu'; return; }
    const d = Math.floor(ms / 86_400_000);
    const h = Math.floor((ms % 86_400_000) / 3_600_000);
    const m = Math.floor((ms % 3_600_000)  /    60_000);
    const s = Math.floor((ms %    60_000)  /     1_000);
    countdownEl.textContent = d > 0
      ? `Avspark om ${d}d ${h}h ${m}m`
      : h > 0
        ? `Avspark om ${h}h ${m}m ${s}s`
        : `Avspark om ${m}m ${s}s`;
  }

  tick();
  setInterval(tick, 1000);
</script>
</body>
</html>
